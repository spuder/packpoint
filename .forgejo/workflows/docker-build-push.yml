name: Build and Push Docker Image

on:
  push:
    branches:
    - main
    tags:
    - 'v*'
  workflow_dispatch:


env:
  REGISTRY: forgejo.snowy-vibes.ts.net
  IMAGE_NAME: packpoint

jobs:
  # deploy:
  #   runs-on: docker

  #   steps:
  #   - name: Deploy via Dockhand
  #     run: |
  #       PAYLOAD=""
  #       SIG=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "${{ secrets.DOCKHAND_WEBHOOK_SECRET }}" | cut -d' ' -f2)
  #       curl -X POST "https://dockhand.snowy-vibes.ts.net/api/git/stacks/4/webhook" \
  #         -H "X-Hub-Signature-256: sha256=$SIG" \
  #         -H "Content-Type: application/json" \
  #         -d "$PAYLOAD"

  build-and-push:
    runs-on: docker
    permissions:
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Docker CLI
      run: apt-get update -y -qq && apt-get install -y -qq docker.io

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Forgejo Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.REGISTRY_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
